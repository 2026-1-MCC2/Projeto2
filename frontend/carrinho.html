<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Carrinho - AlimConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="bg-[#FAF9F6] text-slate-900">
    <header class="p-6 bg-white border-b flex justify-between items-center">
        <h1 class="text-2xl font-black text-[#5D4037]">AlimConect</h1>
        <a href="index.html" class="bg-[#5D4037] text-white px-4 py-2 rounded-lg text-sm">Voltar para a Loja</a>
    </header>
    <main class="max-w-6xl mx-auto p-10">
        <h2 class="text-3xl font-bold mb-10 text-[#5D4037]">Seu Carrinho</h2>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2 space-y-6" id="lista-carrinho"></div>
            <div class="bg-white p-8 rounded-3xl shadow-sm border h-fit">
                <h3 class="text-xl font-bold text-[#5D4037] mb-6">Resumo</h3>
                <div class="flex justify-between mb-4 pb-4 border-b">
                    <span>Total</span>
                    <span class="font-bold text-lg text-green-600">R$ <span id="total-carrinho">0,00</span></span>
                </div>
                <button class="w-full bg-[#FFCC80] text-[#5D4037] font-bold py-4 rounded-xl shadow-lg hover:bg-[#ffbd5c]">Finalizar Compra</button>
            </div>
        </div>
    </main>
    <script>
        const lista = document.getElementById('lista-carrinho');
        const totalHtml = document.getElementById('total-carrinho');
        let carrinho = JSON.parse(localStorage.getItem('carrinhoAlim')) || [];

        function render() {
            lista.innerHTML = '';
            let soma = 0;
            if (carrinho.length === 0) {
                lista.innerHTML = '<p class="text-slate-500">Carrinho vazio.</p>';
            } else {
                carrinho.forEach((p, i) => {
                    soma += p.preco * p.qtd;
                    const item = document.createElement('div');
                    item.className = "flex items-center gap-6 bg-white p-4 rounded-2xl border";
                    item.innerHTML = `
                        <img src="${p.foto}" class="w-16 h-16 object-cover rounded-lg">
                        <div class="flex-grow">
                            <p class="font-bold text-[#5D4037]">${p.nome}</p>
                            <p class="text-sm text-slate-400">Qtd: ${p.qtd} x R$ ${p.preco.toFixed(2)}</p>
                        </div>
                        <button onclick="remover(${i})" class="text-red-500 font-bold">X</button>`;
                    lista.appendChild(item);
                });
            }
            totalHtml.innerText = soma.toFixed(2);
        }
        window.remover = (i) => { carrinho.splice(i, 1); localStorage.setItem('carrinhoAlim', JSON.stringify(carrinho)); render(); }
        render();
    </script>
</body>
</html>
