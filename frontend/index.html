<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Projeto Faculdade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">MeuProjeto</div>
        <nav>
            <a href="#">Início</a>
            <a href="#login-section" class="btn-nav">Acessar</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Bem-vindo ao Sistema</h1>
            <p>Uma plataforma integrada ao Banco de Dados.</p>
        </section>

        <section id="login-section" class="login-container">
            <div class="login-card">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="password" placeholder="******" required>
                    </div>
                    <button type="submit" class="btn-primary">Entrar</button>
                </form>
                <p id="msg-erro" class="erro"></p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Desenvolvido para o Trabalho Acadêmico</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
