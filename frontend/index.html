<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlimConect - Mercado B2B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        body { font-family: 'Manrope', sans-serif; scroll-behavior: smooth; }
        :root { --bege: #F5F5DC; --laranja-claro: #FFCC80; --marrom-texto: #5D4037; }
        #sugestoes-busca::-webkit-scrollbar { width: 6px; }
        #sugestoes-busca::-webkit-scrollbar-thumb { background: #FFCC80; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#FAF9F6] text-slate-900">

    <header class="flex items-center justify-between px-6 py-4 bg-white border-b sticky top-0 z-50">
        <div class="flex items-center gap-2 text-[#5D4037]">
            <span class="material-symbols-outlined text-[#FFCC80]">nutrition</span>
            <span class="text-xl font-extrabold tracking-tight">AlimConect</span>
        </div>

        <div class="hidden lg:flex relative w-1/3">
            <div class="relative w-full">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input type="text" id="input-busca" placeholder="O que você busca?" autocomplete="off" class="w-full pl-10 pr-4 py-2 bg-slate-50 rounded-full border outline-none focus:ring-2 focus:ring-[#FFCC80] text-sm">
            </div>
            <div id="sugestoes-busca" class="hidden absolute top-full left-0 w-full bg-white mt-2 rounded-xl shadow-2xl border max-h-80 overflow-y-auto z-[60]"></div>
        </div>

        <nav class="hidden md:flex items-center gap-8 font-semibold text-sm text-slate-600">
            <a href="#" class="hover:text-[#5D4037]">Início</a>
            <a href="#sobre" class="hover:text-[#5D4037]">Quem Somos</a>
            <a href="#produtos" class="hover:text-[#5D4037]">Produtos</a>
            <a href="#contato" class="hover:text-[#5D4037]">Contato</a>
            <a href="#login" class="bg-[#5D4037] text-white px-4 py-2 rounded-lg hover:bg-[#4a332c] transition">Acessar Portal</a>

            <a href="favoritos.html" class="relative text-slate-600 hover:text-red-500 transition-colors">
                <span class="material-symbols-outlined text-3xl">favorite</span>
                <span id="contador-favoritos" class="absolute -top-1.5 -right-2 bg-red-500 text-white text-xs font-bold rounded-full size-5 flex items-center justify-center">0</span>
            </a>
        </nav>
    </header>

    <main>
        <section class="relative px-6 py-24 md:py-40 text-center overflow-hidden">
            <div class="absolute inset-0 z-0">
                <img src="assets/banner.png" class="w-full h-full object-cover" alt="Banner">
                <div class="absolute inset-0 bg-black/50"></div>
            </div>
            <div class="relative z-10 max-w-4xl mx-auto text-white">
                <h1 class="text-4xl md:text-6xl font-black mb-4">Conectando <span class="text-[#FFCC80]">Nozes e Snacks</span></h1>
                <p class="text-lg mb-8 opacity-90">O principal marketplace B2B para o setor de alimentos saudáveis.</p>
                <a href="#produtos" class="bg-[#FFCC80] text-[#5D4037] px-8 py-3 rounded-xl font-bold shadow-lg">Ver Catálogo</a>
            </div>
        </section>

        <section id="produtos" class="px-6 py-16 max-w-6xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 border-b pb-4">
                <h2 class="text-3xl font-bold text-[#5D4037]">Nossos Produtos</h2>
                <div class="flex items-center gap-2">
                    <label class="text-sm font-bold text-slate-500 uppercase">Ordenar por:</label>
                    <select id="ordenar" class="bg-white border rounded-lg px-3 py-2 text-sm outline-none cursor-pointer">
                        <option value="relevancia">Relevância</option>
                        <option value="preco-menor">Preço: Menor ao Maior</option>
                        <option value="preco-maior">Preço: Maior ao Menor</option>
                        <option value="az">A - Z</option>
                        <option value="za">Z - A</option>
                    </select>
                </div>
            </div>
            <div id="grid-produtos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <footer class="py-10 text-center border-t text-slate-400 text-sm">
        <p>&copy; 2026 AlimConect Marketplace. Todos os direitos reservados.</p>
    </footer>

    <script>
        // LISTA ATUALIZADA: Mantendo as duas fotos (embalagem e sem embalagem)
        const produtos = [
            { id: 'amendoim', nome: 'Amendoim Pimenta e Limão', foto: 'assets/amendoim.png', foto2: 'assets/amendoimpimenta.png', preco: 8.50 },
            { id: 'batata', nome: 'Batata Chips Artesanal', foto: 'assets/batata.png', foto2: 'assets/batataprato.png', preco: 12.00 },
            { id: 'biscoito', nome: 'Biscoitos de Polvilho', foto: 'assets/biscoito.png', foto2: 'assets/biscoitonoprato.png', preco: 6.90 },
            { id: 'castanha', nome: 'Castanha de Caju Premium', foto: 'assets/castanhas.png', foto2: 'assets/castanhasnoprato.png', preco: 15.00 },
            { id: 'mix-castanhas', nome: 'Mix de Castanhas Mistas', foto: 'assets/castanhasmistas.png', foto2: 'assets/castanhaspremiumnoprato.png', preco: 18.50 },
            { id: 'milho', nome: 'Snacks de Milho Torrado', foto: 'assets/milho.png', foto2: 'assets/milhoprato.png', preco: 7.50 },
            { id: 'pretzel', nome: 'Pretzel Salgado Tradicional', foto: 'assets/pretzel.png', foto2: 'assets/pretzelprato1.png', preco: 9.00 }
        ];

        const grid = document.getElementById('grid-produtos');
        const inputBusca = document.getElementById('input-busca');
        const listaSugestoes = document.getElementById('sugestoes-busca');
        const contadorFavoritos = document.getElementById('contador-favoritos');

        // FUNÇÃO ATUALIZADA PARA FAVORITOS
        function atualizarContador() {
            let favoritos = JSON.parse(localStorage.getItem('favoritosAlim')) || [];
            contadorFavoritos.innerText = favoritos.length;
        }

        function render(lista) {
            grid.innerHTML = '';
            lista.forEach(p => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl shadow-sm border group";
                div.innerHTML = `
                    <a href="produto.html?item=${p.id}">
                        <div class="h-48 bg-slate-200 rounded-xl mb-4 overflow-hidden relative">
                            <img src="${p.foto}" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-500 group-hover:opacity-0">
                            <img src="${p.foto2}" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500 group-hover:opacity-100 scale-105">
                        </div>
                        <h3 class="font-bold text-lg text-[#5D4037] hover:text-[#FFCC80]">${p.nome}</h3>
                    </a>
                    <p class="text-slate-500 text-sm">Produção Nacional</p>
                    <div class="flex justify-between items-center mt-4 pt-3 border-t">
                        <span class="font-bold">R$ ${p.preco.toFixed(2)}</span>
                        <a href="produto.html?item=${p.id}" class="text-sm font-bold text-red-400 hover:text-red-600 flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">favorite</span> Favoritar
                        </a>
                    </div>`;
                grid.appendChild(div);
            });
        }

        // ... Restante da lógica de busca e ordenação permanece igual, apenas mudando a renderização ...

        document.getElementById('ordenar').addEventListener('change', (e) => {
            let sorted = [...produtos];
            if(e.target.value === 'preco-menor') sorted.sort((a,b) => a.preco - b.preco);
            else if(e.target.value === 'preco-maior') sorted.sort((a,b) => b.preco - a.preco);
            else if(e.target.value === 'az') sorted.sort((a,b) => a.nome.localeCompare(b.nome));
            else if(e.target.value === 'za') sorted.sort((a,b) => b.nome.localeCompare(a.nome));
            render(sorted);
        });

        inputBusca.addEventListener('input', () => {
            const termo = inputBusca.value.toLowerCase();
            listaSugestoes.innerHTML = '';
            if (termo.length > 0) {
                const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));
                if (filtrados.length > 0) {
                    listaSugestoes.classList.remove('hidden');
                    filtrados.forEach(p => {
                        const div = document.createElement('div');
                        div.className = "flex items-center gap-3 p-3 hover:bg-slate-50 cursor-pointer border-b";
                        div.innerHTML = `<img src="${p.foto}" class="w-8 h-8 rounded"><span class="text-sm font-bold">${p.nome}</span>`;
                        div.onclick = () => window.location.href = `produto.html?item=${p.id}`;
                        listaSugestoes.appendChild(div);
                    });
                }
            } else { listaSugestoes.classList.add('hidden'); }
        });

        render(produtos);
        atualizarContador();
    </script>
</body>
</html>
