<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meus Favoritos - AlimConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>body { font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="bg-[#FAF9F6] text-slate-900">
    <header class="p-6 bg-white border-b flex justify-between items-center">
        <h1 class="text-2xl font-black text-[#5D4037]">AlimConect</h1>
        <a href="index.html" class="bg-[#5D4037] text-white px-4 py-2 rounded-lg text-sm">Voltar para a Loja</a>
    </header>
    <main class="max-w-4xl mx-auto p-10">
        <h2 class="text-3xl font-bold mb-10 text-[#5D4037] flex items-center gap-2">
            <span class="material-symbols-outlined text-red-500">favorite</span> Meus Favoritos
        </h2>
        <div id="lista-favoritos" class="space-y-6"></div>
    </main>

    <script>
        const listaHtml = document.getElementById('lista-favoritos');
        let favoritos = JSON.parse(localStorage.getItem('favoritosAlim')) || [];

        function render() {
            listaHtml.innerHTML = '';
            if (favoritos.length === 0) {
                listaHtml.innerHTML = '<p class="text-slate-500 text-center py-10">Sua lista está vazia.</p>';
            } else {
                favoritos.forEach((p, i) => {
                    const item = document.createElement('div');
                    item.className = "flex items-center gap-6 bg-white p-6 rounded-2xl border shadow-sm";
                    item.innerHTML = `
                        <img src="${p.foto}" class="w-20 h-20 object-cover rounded-xl">
                        <div class="flex-grow">
                            <p class="font-bold text-lg text-[#5D4037]">${p.nome}</p>
                            <p class="text-green-600 font-bold">R$ ${p.preco.toFixed(2)}</p>
                        </div>
                        <div class="flex gap-4">
                            <a href="produto.html?item=${p.id}" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold">Ver Detalhes</a>
                            <button onclick="remover(${i})" class="text-red-500 font-bold">Excluir</button>
                        </div>`;
                    listaHtml.appendChild(item);
                });
            }
        }

        window.remover = (i) => { 
            favoritos.splice(i, 1); 
            localStorage.setItem('favoritosAlim', JSON.stringify(favoritos)); 
            render(); 
        }
        render();
    </script>
</body>
</html>
