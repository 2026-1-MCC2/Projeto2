<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Favoritar Produto - AlimConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>body { font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="bg-[#FAF9F6]">
    <div class="max-w-6xl mx-auto p-10">
        <a href="index.html" class="text-[#5D4037] font-bold underline">← Voltar para o Início</a>
        
        <div id="conteudo-produto" class="grid grid-cols-1 md:grid-cols-2 gap-10 mt-10 bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            
            <div class="flex gap-4">
                <div class="flex flex-col gap-2 w-20">
                    <img id="thumb-1" src="" onclick="trocarImagem(this.src)" 
                         class="w-full h-20 object-contain p-1 bg-slate-50 rounded-lg border-2 border-[#FFCC80] cursor-pointer transition">
                    <img id="thumb-2" src="" onclick="trocarImagem(this.src)" 
                         class="w-full h-20 object-contain p-1 bg-slate-50 rounded-lg border-2 border-transparent hover:border-[#FFCC80] cursor-pointer transition">
                </div>

                <div class="flex-1 h-96 bg-slate-50 rounded-2xl flex items-center justify-center overflow-hidden border border-slate-100">
                    <img id="img-detalhe" src="" class="max-h-[90%] object-contain hover:scale-110 transition duration-500">
                </div>
            </div>

            <div class="flex flex-col justify-center">
                <span class="text-[#FFCC80] font-bold uppercase tracking-widest text-sm">Produção Nacional</span>
                <h1 id="nome-produto" class="text-4xl font-black text-[#5D4037] mt-2">Carregando...</h1>
                
                <div class="mt-8 p-4 bg-[#F5F5DC]/30 rounded-xl w-fit">
                    <span class="text-3xl font-bold text-slate-900">R$ <span id="preco-produto">0,00</span></span>
                </div>

                <button onclick="toggleFavorito()" id="btn-fav" class="mt-8 w-full flex items-center justify-center gap-2 bg-white border-2 border-red-500 text-red-500 font-bold py-4 rounded-xl shadow-lg hover:bg-red-50 transition transform active:scale-95">
                    <span class="material-symbols-outlined">favorite</span>
                    Favoritar Produto
                </button>
            </div>
        </div>
    </div>

    <script>
        // Banco de dados atualizado com as fotos extras
        const db = {
            'amendoim': { id: 'amendoim', nome: "Amendoim Pimenta e Limão", foto: "assets/amendoim.png", foto2: "assets/amendoimpimenta.png", preco: 8.50 },
            'batata': { id: 'batata', nome: "Batata Chips Artesanal", foto: "assets/batata.png", foto2: "assets/batataprato.png", preco: 12.00 },
            'biscoito': { id: 'biscoito', nome: "Biscoitos de Polvilho", foto: "assets/biscoito.png", foto2: "assets/biscoitonoprat.png", preco: 6.90 },
            'castanha': { id: 'castanha', nome: "Castanha de Caju Premium", foto: "assets/castanhas.png", foto2: "assets/castanhasnopr.png", preco: 15.00 },
            'mix-castanhas': { id: 'mix-castanhas', nome: "Mix de Castanhas Mistas", foto: "assets/castanhasmistas.png", foto2: "assets/castanhaspremiumnoprat.png", preco: 18.50 },
            'milho': { id: 'milho', nome: "Snacks de Milho Torrado", foto: "assets/milho.png", foto2: "assets/milhoprato.png", preco: 7.50 },
            'pretzel': { id: 'pretzel', nome: "Pretzel Salgado Tradicional", foto: "assets/pretzel.png", foto2: "assets/pretzelprato1.png", preco: 9.00 }
        };

        const params = new URLSearchParams(window.location.search);
        const prodId = params.get('item');
        const prod = db[prodId];

        if (prod) {
            document.getElementById('nome-produto').innerText = prod.nome;
            document.getElementById('preco-produto').innerText = prod.preco.toFixed(2);
            document.getElementById('img-detalhe').src = prod.foto;
            
            // Carregar as miniaturas
            document.getElementById('thumb-1').src = prod.foto;
            document.getElementById('thumb-2').src = prod.foto2;
        }

        // Função para trocar a imagem ao clicar na miniatura
        window.trocarImagem = (url) => {
            document.getElementById('img-detalhe').src = url;
            
            // Atualiza as bordas das miniaturas
            const t1 = document.getElementById('thumb-1');
            const t2 = document.getElementById('thumb-2');
            t1.classList.toggle('border-[#FFCC80]', t1.src === url);
            t1.classList.toggle('border-transparent', t1.src !== url);
            t2.classList.toggle('border-[#FFCC80]', t2.src === url);
            t2.classList.toggle('border-transparent', t2.src !== url);
        }

        window.toggleFavorito = () => {
            if(!prod) return;
            let favs = JSON.parse(localStorage.getItem('favoritosAlim')) || [];
            const index = favs.findIndex(f => f.id === prod.id);

            if(index > -1) {
                favs.splice(index, 1);
                alert("Removido dos favoritos!");
            } else {
                favs.push(prod);
                alert("Adicionado aos favoritos!");
            }
            localStorage.setItem('favoritosAlim', JSON.stringify(favs));
            window.location.href = 'favoritos.html';
        }
    </script>
</body>
</html>
